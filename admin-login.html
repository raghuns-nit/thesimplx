<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - theSimpLx</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="logo-icon mb-4">🏗️</div>
        <h1 class="mb-2">Admin Portal</h1>
        <p class="text-muted mb-8">Sign in with your authorized Google Account to access the CMS.</p>
        
        <button id="loginBtn" class="btn btn-primary btn-block" style="padding: 0.75rem;" onclick="handleLogin()">
            Sign in with Google
        </button>
        
        <p id="errorMsg" class="mt-4" style="color: var(--danger); display: none;"></p>
        
        <div class="mt-8 text-sm text-muted">
            <a href="index.html">&larr; Back to Website</a>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script src="js/drive.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/activity.js"></script>
    <script>
        window.onAppReady = async function() {
            if(accessToken) {
                const isValid = await validateAdminSession();
                if(isValid) {
                    await logActivity('LOGIN', 'user', STATE.userEmail);
                    window.location.href = 'admin.html';
                } else {
                    document.getElementById('errorMsg').innerText = "Unauthorized account. Please contact Super Admin.";
                    document.getElementById('errorMsg').style.display = 'block';
                    google.accounts.oauth2.revoke(accessToken);
                    accessToken = null;
                }
            }
        };
    </script>
</body>
</html>
